<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn | Fluent Data Science</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#2e7d32', dark: '#1b5e20', light: '#e8f5e9' },
                    fontFamily: { mono: ['ui-monospace', 'monospace'] }
                }
            }
        }
    </script>
</head>
<body>
    <div class="page-container">
        <header class="mb-16 text-center">
            <h1 class="text-4xl font-bold text-dark mb-4 tracking-tight">Interactive Guides</h1>
            <p class="text-gray-600 italic">Deep-dive tutorials designed to build intuition for competitive data science.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="module-grid">
            <!-- Cards (Module 1-7) -->
            <script>
                const modules = [
                    { id: '01', title: 'Mathematics for ML', desc: 'Vectors, Gradients, and Probability intuition.' },
                    { id: '02', title: 'Tabular Foundations', desc: 'Vectorized Pandas and Relational merging.' },
                    { id: '03', title: 'Feature Engineering I', desc: 'Encoding, Scaling, and Interactions.' },
                    { id: '04', title: 'Feature Engineering II', desc: 'Target Encoding and Contextual Transforms.' },
                    { id: '05', title: 'Validation Architecture', desc: 'CV Frameworks and Leakage Auditing.' },
                    { id: '06', title: 'Tree-Based Models', desc: 'GBDT Mechanics and Regularization.' },
                    { id: '07', title: 'Optimization & Ensembling', desc: 'Optuna and Weighted Blending.' },
                    { id: '08', title: 'Production Pipelines', desc: 'Transition from notebooks to modular scripts.' },
                    { id: '09', title: 'Mock Competition', desc: 'The Capstone challenge. Apply every skill under contest pressure.' }
                ];

                modules.forEach(m => {
                    document.write(`
                        <div class="bg-white border-2 border-primary p-6 shadow-[6px_6px_0px_0px_rgba(46,125,50,1)] hover:translate-x-1 hover:translate-y-1 hover:shadow-none transition-all cursor-pointer group flex flex-col" onclick="location.href='learn/module${m.id}.html'">
                            <h3 class="text-[10px] uppercase text-gray-400 font-bold mb-2">Module ${m.id}</h3>
                            <h2 class="text-lg font-bold text-dark group-hover:text-primary transition mb-3 leading-tight">${m.title}</h2>
                            <p class="text-[13px] text-gray-500 mb-6 flex-grow">${m.desc}</p>
                            <div class="text-primary font-bold text-xs uppercase tracking-widest">Start Reading →</div>
                        </div>
                    `);
                });
            </script>

            <!-- Placeholder -->
            <div class="bg-gray-50 border-2 border-dashed border-gray-300 p-6 flex items-center justify-center text-gray-400 italic text-sm">
                Next modules in development...
            </div>
        </div>
    </div>

    <script src="components/common.js"></script>
</body>
</html>
